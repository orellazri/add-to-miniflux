<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Add to Miniflux Settings</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="options">
      <h1>Add to Miniflux Settings</h1>
      <p class="subtitle">Configure your Miniflux connection.</p>

      <div class="form-group">
        <label for="baseUrl">Miniflux Base URL</label>
        <input type="url" id="baseUrl" placeholder="https://miniflux.example.com" />
        <p class="hint">You can include or omit <code>/v1</code>. It is normalized automatically.</p>
      </div>

      <div class="form-group">
        <label for="apiToken">API Token</label>
        <input type="password" id="apiToken" placeholder="Your Miniflux API token" />
        <p class="hint">Create an API key in Miniflux under Settings &gt; API Keys.</p>
      </div>

      <button id="saveBtn" class="btn btn-primary">Save Settings</button>

      <div id="status" class="status"></div>
    </div>

    <script src="options.js"></script>
  </body>
</html>
